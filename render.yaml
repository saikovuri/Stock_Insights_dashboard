services:
  - type: web
    name: stock-insights-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CORS_ORIGINS
        sync: false
      - key: PYTHON_VERSION
        value: "3.13"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
